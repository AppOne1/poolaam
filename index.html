<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>پنل مدیریت پولام</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Vazirmatn',sans-serif}
body{background:#FAF7F2;color:#3D3220;min-height:100vh;padding:20px}
.container{max-width:600px;margin:0 auto}
.logo{text-align:center;margin-bottom:24px}
.logo h1{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#B8860B,#DAA520);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{color:rgba(61,50,32,.4);font-size:.75rem;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat-box{background:#fff;border:1px solid rgba(184,134,11,.12);border-radius:12px;padding:14px 6px;text-align:center;box-shadow:0 2px 8px rgba(184,134,11,.06)}
.stat-num{font-size:1.3rem;font-weight:800;color:#B8860B}
.stat-num.green{color:#6B8E23}
.stat-num.red{color:#CD5C5C}
.stat-num.yellow{color:#DAA520}
.stat-label{font-size:.55rem;color:rgba(61,50,32,.45);margin-top:2px}
.card{background:#fff;border:1px solid rgba(184,134,11,.12);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(184,134,11,.05)}
.card h2{font-size:.9rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:#5C4A1E}
label{display:block;font-size:.7rem;font-weight:600;color:rgba(61,50,32,.55);margin-bottom:5px}
input,select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(184,134,11,.18);background:#FFFDF8;color:#3D3220;font-family:inherit;font-size:.8rem;outline:none;margin-bottom:12px;direction:ltr;text-align:left}
input:focus,select:focus{border-color:#DAA520;box-shadow:0 0 0 3px rgba(218,165,32,.12)}
select option{background:#FFFDF8;color:#3D3220}
.btn{width:100%;padding:12px;border:none;border-radius:12px;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#B8860B,#DAA520);color:#fff;box-shadow:0 4px 12px rgba(184,134,11,.2)}
.btn-copy{background:rgba(107,142,35,.1);color:#556B2F;border:1px solid rgba(107,142,35,.2);margin-top:6px;font-size:.7rem;padding:10px}
.btn-share{background:rgba(184,134,11,.1);color:#8B6914;border:1px solid rgba(184,134,11,.2);margin-top:6px;font-size:.7rem;padding:10px}
.result{background:rgba(107,142,35,.08);border:1px solid rgba(107,142,35,.15);border-radius:12px;padding:16px;margin-top:14px;display:none}
.result.show{display:block}
.result-label{font-size:.6rem;color:rgba(61,50,32,.45);margin-bottom:3px}
.result-key{font-size:1.1rem;font-weight:800;letter-spacing:2px;color:#556B2F;direction:ltr;text-align:center;padding:10px;background:rgba(107,142,35,.06);border:1px solid rgba(107,142,35,.12);border-radius:8px;margin:8px 0;user-select:all;font-family:monospace}
.result-btns{display:flex;gap:6px}
.result-btns .btn{flex:1}
.search-box{display:flex;gap:8px;margin-bottom:12px}
.search-box input{margin-bottom:0;flex:1}
.search-btn{padding:10px 16px;border:none;border-radius:10px;background:#B8860B;color:#fff;cursor:pointer;font-family:inherit;font-weight:600;font-size:.75rem}
.history-preview{margin-top:8px}
.history-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(184,134,11,.08);font-size:.7rem}
.history-row:last-child{border:none}
.h-left{display:flex;align-items:center;gap:6px}
.h-type{display:inline-block;padding:2px 7px;border-radius:6px;font-size:.5rem;font-weight:700}
.h-type.pro{background:rgba(107,142,35,.12);color:#556B2F}
.h-type.family{background:rgba(184,134,11,.12);color:#8B6914}
.h-device{color:rgba(61,50,32,.5);direction:ltr;font-family:monospace;font-size:.65rem}
.h-date{color:rgba(61,50,32,.35);font-size:.55rem;white-space:nowrap}
.h-key{direction:ltr;font-family:monospace;color:#556B2F;font-size:.65rem;padding:3px 8px;cursor:pointer;background:rgba(107,142,35,.04);border-radius:6px;display:inline-block}
.h-key:hover{background:rgba(107,142,35,.1)}
.h-status{display:inline-block;padding:2px 7px;border-radius:6px;font-size:.5rem;font-weight:700}
.h-status.active{background:rgba(107,142,35,.12);color:#556B2F}
.h-status.expired{background:rgba(205,92,92,.12);color:#CD5C5C}
.h-status.expiring{background:rgba(184,134,11,.12);color:#8B6914}
.view-all-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border:1px dashed rgba(184,134,11,.2);border-radius:10px;background:transparent;color:rgba(61,50,32,.4);font-family:inherit;font-size:.65rem;font-weight:600;cursor:pointer;margin-top:8px}
.view-all-btn:hover{border-color:rgba(184,134,11,.4);color:rgba(61,50,32,.7);background:rgba(184,134,11,.04)}
.empty{text-align:center;color:rgba(61,50,32,.3);font-size:.7rem;padding:20px}
.popup-overlay{position:fixed;inset:0;background:rgba(61,50,32,.25);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.popup-overlay.open{opacity:1;pointer-events:all}
.popup-box{width:94%;max-width:560px;max-height:80vh;background:#FFFDF8;border:1px solid rgba(184,134,11,.15);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;transform:scale(.9);transition:transform .35s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 20px 60px rgba(61,50,32,.15)}
.popup-overlay.open .popup-box{transform:scale(1)}
.popup-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(184,134,11,.08);flex-shrink:0}
.popup-header h3{font-size:.85rem;font-weight:700;color:#5C4A1E}
.popup-close{background:none;border:none;color:rgba(61,50,32,.4);font-size:1.1rem;cursor:pointer;padding:4px 8px;border-radius:8px}
.popup-close:hover{background:rgba(184,134,11,.08)}
.popup-toolbar{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid rgba(184,134,11,.08);flex-shrink:0;align-items:center;flex-wrap:wrap}
.popup-search{flex:1;min-width:100px;padding:8px 12px;border-radius:8px;border:1px solid rgba(184,134,11,.15);background:#FAF7F2;color:#3D3220;font-family:inherit;font-size:.7rem;outline:none;direction:ltr}
.popup-search:focus{border-color:#DAA520;box-shadow:0 0 0 3px rgba(218,165,32,.1)}
.popup-filter{padding:6px 10px;border-radius:8px;border:1px solid rgba(184,134,11,.15);background:transparent;color:rgba(61,50,32,.5);font-family:inherit;font-size:.6rem;cursor:pointer;transition:all .2s}
.popup-filter:hover{border-color:rgba(184,134,11,.3)}
.popup-filter.active{background:rgba(184,134,11,.12);color:#8B6914;border-color:rgba(184,134,11,.3)}
.popup-body{flex:1;overflow-y:auto;padding:12px 20px}
.popup-body::-webkit-scrollbar{width:4px}
.popup-body::-webkit-scrollbar-track{background:transparent}
.popup-body::-webkit-scrollbar-thumb{background:rgba(184,134,11,.15);border-radius:2px}
.popup-footer{display:flex;gap:8px;padding:12px 20px;border-top:1px solid rgba(184,134,11,.08);flex-shrink:0;flex-wrap:wrap}
.popup-footer .btn{font-size:.7rem;padding:10px;flex:1}
.popup-count{font-size:.6rem;color:rgba(61,50,32,.35)}
.popup-item{padding:10px 0;border-bottom:1px solid rgba(184,134,11,.06)}
.popup-item:last-child{border:none}
.popup-item-top{display:flex;align-items:center;justify-content:space-between}
.popup-item-info{display:flex;align-items:center;gap:6px}
.popup-item-key{direction:ltr;font-family:monospace;color:#556B2F;font-size:.68rem;padding:3px 8px;cursor:pointer;background:rgba(107,142,35,.04);border-radius:6px;display:inline-block}
.popup-item-key:hover{background:rgba(107,142,35,.1)}
.popup-item-meta{display:flex;gap:10px;font-size:.5rem;color:rgba(61,50,32,.4);flex-wrap:wrap}
.popup-item-note{font-size:.55rem;color:rgba(61,50,32,.35);margin-top:2px}
.popup-item-del{background:none;border:1px solid rgba(205,92,92,.2);border-radius:6px;padding:3px 8px;color:#CD5C5C;font-size:.5rem;cursor:pointer;font-family:inherit}
.popup-item-del:hover{background:rgba(205,92,92,.08)}
.popup-empty{text-align:center;color:rgba(61,50,32,.25);padding:40px;font-size:.75rem}
.toast-msg{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);padding:10px 22px;border-radius:12px;font-size:.72rem;font-weight:600;z-index:999;transition:transform .4s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 6px 24px rgba(61,50,32,.15)}
.toast-msg.green{background:#556B2F;color:#fff}
.toast-msg.red{background:#CD5C5C;color:#fff}
.toast-msg.show{transform:translateX(-50%) translateY(0)}
.backup-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.backup-row .btn{flex:1;min-width:100px}
.backup-btn{background:#FAF7F2;color:#5C4A1E;border:1px solid rgba(184,134,11,.15);font-size:.7rem;padding:10px}
.backup-btn:hover{background:rgba(184,134,11,.06)}
.footer{text-align:center;padding:16px;color:rgba(61,50,32,.2);font-size:.55rem}
</style>
</head>
<body>
<div class="container">

<div class="logo">
<h1>پولام · پنل مدیریت</h1>
<p>طراحی: علوی · سیستم صدور لایسنس · v5.0.0</p>
</div>

<div class="stats">
<div class="stat-box"><div class="stat-num" id="statTotal">0</div><div class="stat-label">کل</div></div>
<div class="stat-box"><div class="stat-num green" id="statActive">0</div><div class="stat-label">فعال</div></div>
<div class="stat-box"><div class="stat-num yellow" id="statExpiring">0</div><div class="stat-label">رو به اتمام</div></div>
<div class="stat-box"><div class="stat-num red" id="statExpired">0</div><div class="stat-label">منقضی</div></div>
</div>

<div class="card">
<h2>🔑 صدور لایسنس جدید</h2>
<label>شناسه دستگاه</label>
<input type="text" id="deviceIdInput" placeholder="مثلاً: 7BCZXE یا MRLIIDXX" style="text-transform:uppercase" maxlength="12">
<label>نوع لایسنس</label>
<select id="licenseType"><option value="PRO">پرو</option><option value="FAMILY">خانواده</option></select>
<label>مدت</label>
<select id="licenseDuration"><option value="1">۱ ماه</option><option value="3">۳ ماه</option><option value="6">۶ ماه</option><option value="12">۱۲ ماه</option></select>
<label>یادداشت</label>
<input type="text" id="licenseNote" placeholder="نام مشتری...">
<button class="btn btn-primary" onclick="generateLicense()">صدور لایسنس</button>
<div class="result" id="resultArea">
<div class="result-label">کد لایسنس:</div>
<div class="result-key" id="resultKey"></div>
<div class="result-label" id="resultInfo"></div>
<div class="result-btns">
<button class="btn btn-copy" onclick="copyText(document.getElementById('resultKey').textContent)">📋 کپی کد</button>
<button class="btn btn-share" onclick="shareKey()">📤 ارسال</button>
</div>
</div>
</div>

<div class="card">
<h2>🔍 جستجو</h2>
<div class="search-box">
<input type="text" id="searchInput" placeholder="شناسه، کد یا نام..." oninput="searchLicense()">
<button class="search-btn" onclick="searchLicense()">جستجو</button>
</div>
<div id="searchResult"></div>
</div>

<div class="card">
<h2>📜 آخرین صدورها <span class="popup-count" id="recentCount"></span></h2>
<div class="history-preview" id="recentList"></div>
<button class="view-all-btn" onclick="openHistoryPopup()" id="viewAllBtn">📋 مشاهده همه تاریخچه <span id="viewAllCount"></span></button>
</div>

<div class="card">
<h2>💾 پشتیبان‌گیری</h2>
<div class="backup-row">
<button class="btn backup-btn" onclick="exportJSON()">📤 خروجی JSON</button>
<button class="btn backup-btn" onclick="document.getElementById('importFile').click()">📥 بازیابی</button>
<button class="btn backup-btn" onclick="exportCSV()">📊 خروجی CSV</button>
</div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
</div>

<div class="footer">طراحی: علوی · پولام نسخه ۵.۰.۰</div>
</div>

<div class="popup-overlay" id="historyPopup">
<div class="popup-box">
<div class="popup-header">
<h3>📜 تاریخچه کامل صدورها</h3>
<button class="popup-close" onclick="closeHistoryPopup()">✕</button>
</div>
<div class="popup-toolbar">
<input class="popup-search" type="text" id="popupSearch" placeholder="جستجو..." oninput="renderPopupList()">
<button class="popup-filter active" id="filterAll" onclick="setFilter('ALL')">همه</button>
<button class="popup-filter" id="filterPRO" onclick="setFilter('PRO')">پرو</button>
<button class="popup-filter" id="filterFAMILY" onclick="setFilter('FAMILY')">خانواده</button>
<button class="popup-filter" id="filterActive" onclick="setFilter('ACTIVE')">فعال</button>
<button class="popup-filter" id="filterExpired" onclick="setFilter('EXPIRED')">منقضی</button>
</div>
<div class="popup-body" id="popupList"></div>
<div class="popup-footer">
<button class="btn backup-btn" onclick="exportCSV()">📥 CSV</button>
<button class="btn backup-btn" onclick="exportJSON()">📤 JSON</button>
<button class="btn" onclick="clearAll()" style="background:rgba(205,92,92,.08);color:#CD5C5C;border:1px solid rgba(205,92,92,.15)">🗑️ پاک همه</button>
</div>
</div>
</div>

<div class="toast-msg" id="toastEl"></div>

<script>
var licList = [];
var popupFilter = 'ALL';

function loadLicenses() {
  try {
    var raw = localStorage.getItem('poolam_lics');
    if (raw) {
      var parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) licList = parsed;
      else licList = [];
    }
  } catch (e) { licList = []; }
}

function saveLicenses() {
  try { localStorage.setItem('poolam_lics', JSON.stringify(licList)); } catch (e) {}
}

function showToast(msg, type) {
  var el = document.getElementById('toastEl');
  el.textContent = msg;
  el.className = 'toast-msg ' + type + ' show';
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('کپی شد ✓', 'green');
    }).catch(function() { fallbackCopy(text); });
  } else { fallbackCopy(text); }
}

function fallbackCopy(text) {
  try {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('کپی شد ✓', 'green');
  } catch (e) {
    prompt('کپی کنید:', text);
  }
}

function toJalali(gY, gM, gD) {
  var gdm = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
  var gy2 = (gM > 2) ? (gY + 1) : gY;
  var days = 355666 + (365 * gY) + ((gy2 + 3) / 4 | 0) - ((gy2 + 99) / 100 | 0) + ((gy2 + 399) / 400 | 0) + gD + gdm[gM - 1];
  var jy = -1595 + (33 * (days / 12053 | 0));
  days %= 12053;
  jy += 4 * (days / 1461 | 0);
  days %= 1461;
  if (days > 365) { jy += ((days - 1) / 365 | 0); days = (days - 1) % 365; }
  var jm, jd;
  if (days < 186) { jm = 1 + (days / 31 | 0); jd = 1 + (days % 31); }
  else { jm = 7 + ((days - 186) / 30 | 0); jd = 1 + ((days - 186) % 30); }
  return [jy, jm, jd];
}

function jalaliStr(j) {
  return j[0] + '/' + (j[1] < 10 ? '0' : '') + j[1] + '/' + (j[2] < 10 ? '0' : '') + j[2];
}

function nowJalali() {
  var d = new Date();
  var j = toJalali(d.getFullYear(), d.getMonth() + 1, d.getDate());
  var t = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  return jalaliStr(j) + ' ' + t;
}

function generateChecksum(str) {
  var hash = 0;
  for (var i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash = hash & hash;
  }
  return Math.abs(hash).toString(16).toUpperCase().padStart(4, '0').substring(0, 4);
}

function makeKey(deviceId, type, duration) {
  var part1 = generateChecksum(deviceId + type + 'X1');
  var part2 = generateChecksum(deviceId + duration + type + 'X2');
  return 'POOLAM-' + type + '-' + part1 + '-' + part2;
}

function getLicenseStatus(lic) {
  if (!lic.createdAt || !lic.duration) return { cls: 'active', text: 'فعال' };
  var created = lic.createdAt;
  var expires = created + lic.duration * 30 * 24 * 60 * 60 * 1000;
  var now = Date.now();
  if (now > expires) return { cls: 'expired', text: 'منقضی' };
  if (expires - now < 7 * 24 * 60 * 60 * 1000) return { cls: 'expiring', text: 'انقضا نزدیک' };
  return { cls: 'active', text: 'فعال' };
}

function getDaysLeft(lic) {
  if (!lic.createdAt || !lic.duration) return '-';
  var expires = lic.createdAt + lic.duration * 30 * 24 * 60 * 60 * 1000;
  var diff = Math.ceil((expires - Date.now()) / (1000 * 60 * 60 * 24));
  if (diff < 0) return 'منقضی (' + Math.abs(diff) + ' روز پیش)';
  return diff + ' روز';
}

function getExpiryDate(lic) {
  if (!lic.createdAt || !lic.duration) return '-';
  var d = new Date(lic.createdAt + lic.duration * 30 * 24 * 60 * 60 * 1000);
  var j = toJalali(d.getFullYear(), d.getMonth() + 1, d.getDate());
  return jalaliStr(j);
}

function normalizeDeviceId(raw) {
  return raw.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
}

function generateLicense() {
  var deviceId = normalizeDeviceId(document.getElementById('deviceIdInput').value);
  var type = document.getElementById('licenseType').value;
  var duration = parseInt(document.getElementById('licenseDuration').value);
  var note = document.getElementById('licenseNote').value.trim();

  if (!deviceId) { showToast('شناسه وارد نشده!', 'red'); return; }
  if (deviceId.length < 4 || deviceId.length > 12) { showToast('شناسه باید ۴ تا ۱۲ کاراکتر باشد', 'red'); return; }
  if (!/^[A-Z0-9]+$/.test(deviceId)) { showToast('فقط حروف انگلیسی و اعداد مجاز است', 'red'); return; }

  for (var i = 0; i < licList.length; i++) {
    if (licList[i].deviceId === deviceId && licList[i].type === type && licList[i].duration === duration) {
      var st = getLicenseStatus(licList[i]);
      if (st.cls === 'active' || st.cls === 'expiring') {
        showToast('این شناسه قبلاً ' + type + ' فعال دارد! از تاریخچه کپی کنید.', 'red');
        return;
      }
    }
  }

  var key = makeKey(deviceId, type, duration);
  var now = Date.now();
  var daysTotal = duration * 30;

  licList.unshift({
    id: now,
    deviceId: deviceId,
    key: key,
    type: type,
    duration: duration,
    note: note,
    date: nowJalali(),
    createdAt: now
  });
  saveLicenses();

  document.getElementById('resultKey').textContent = key;
  document.getElementById('resultInfo').innerHTML =
    'شناسه: ' + deviceId +
    '<br>نوع: ' + (type === 'PRO' ? 'پرو' : 'خانواده') +
    '<br>مدت: ' + duration + ' ماه (' + daysTotal + ' روز)' +
    '<br>انقضا: ' + getExpiryDate(licList[0]) +
    (note ? '<br>یادداشت: ' + note : '');
  document.getElementById('resultArea').classList.add('show');
  showToast('لایسنس صادر شد ✓', 'green');
  renderAll();
}

function shareKey() {
  var key = document.getElementById('resultKey').textContent;
  var did = normalizeDeviceId(document.getElementById('deviceIdInput').value);
  var dur = document.getElementById('licenseDuration').value;
  var txt = 'کد لایسنس پولام:\n\n' + key + '\n\nشناسه: ' + did + '\nمدت: ' + dur + ' ماه\n\nدر بخش لایسنس اپ وارد کنید.\nپولام · طراحی: علوی';
  if (navigator.share) {
    navigator.share({ title: 'لایسنس پولام', text: txt }).catch(function() { copyText(txt); });
  } else { copyText(txt); }
}

function searchLicense() {
  var q = document.getElementById('searchInput').value.trim().toUpperCase();
  var el = document.getElementById('searchResult');
  if (!q) { el.innerHTML = ''; return; }
  var found = [];
  for (var i = 0; i < licList.length; i++) {
    var r = licList[i];
    if (r.deviceId.toUpperCase().indexOf(q) !== -1 || r.key.toUpperCase().indexOf(q) !== -1 || (r.note && r.note.toUpperCase().indexOf(q) !== -1)) {
      found.push(r);
    }
  }
  if (!found.length) { el.innerHTML = '<p style="text-align:center;color:rgba(61,50,32,.3);padding:12px;font-size:.7rem">یافت نشد</p>'; return; }
  var h = '';
  for (var i = 0; i < Math.min(found.length, 5); i++) {
    var r = found[i];
    var st = getLicenseStatus(r);
    h += '<div class="history-row"><div class="h-left"><span class="h-type ' + r.type.toLowerCase() + '">' + r.type + '</span><span class="h-device">' + r.deviceId + '</span></div><span class="h-status ' + st.cls + '">' + st.text + '</span></div>';
    h += '<div class="h-key" onclick="copyText(\'' + r.key + '\')">' + r.key + ' 📋</div>';
  }
  el.innerHTML = h;
}

function renderRecent() {
  var el = document.getElementById('recentList');
  var btn = document.getElementById('viewAllBtn');
  var cntEl = document.getElementById('recentCount');
  var viewCnt = document.getElementById('viewAllCount');
  cntEl.textContent = licList.length ? '(' + licList.length + ')' : '';
  if (!licList.length) {
    el.innerHTML = '<div class="empty">هنوز لایسنسی صادر نشده</div>';
    btn.style.display = 'none';
    return;
  }
  var show = Math.min(3, licList.length);
  var h = '';
  for (var i = 0; i < show; i++) {
    var r = licList[i];
    var st = getLicenseStatus(r);
    h += '<div class="history-row"><div class="h-left"><span class="h-type ' + r.type.toLowerCase() + '">' + r.type + '</span><span class="h-device">' + r.deviceId + '</span></div><span class="h-status ' + st.cls + '">' + st.text + '</span></div>';
    h += '<div class="h-key" onclick="copyText(\'' + r.key + '\')">' + r.key + ' 📋</div>';
  }
  el.innerHTML = h;
  btn.style.display = licList.length > 3 ? 'flex' : 'none';
  viewCnt.textContent = licList.length > 3 ? '（' + licList.length + ' مورد）' : '';
}

function renderStats() {
  var active = 0, expiring = 0, expired = 0;
  for (var i = 0; i < licList.length; i++) {
    var st = getLicenseStatus(licList[i]);
    if (st.cls === 'active') active++;
    else if (st.cls === 'expiring') expiring++;
    else expired++;
  }
  document.getElementById('statTotal').textContent = licList.length;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statExpiring').textContent = expiring;
  document.getElementById('statExpired').textContent = expired;
}

function openHistoryPopup() {
  popupFilter = 'ALL';
  document.getElementById('popupSearch').value = '';
  updateFilterBtns();
  renderPopupList();
  document.getElementById('historyPopup').classList.add('open');
}

function closeHistoryPopup() {
  document.getElementById('historyPopup').classList.remove('open');
}

function setFilter(f) {
  popupFilter = f;
  updateFilterBtns();
  renderPopupList();
}

function updateFilterBtns() {
  document.getElementById('filterAll').classList.toggle('active', popupFilter === 'ALL');
  document.getElementById('filterPRO').classList.toggle('active', popupFilter === 'PRO');
  document.getElementById('filterFAMILY').classList.toggle('active', popupFilter === 'FAMILY');
  document.getElementById('filterActive').classList.toggle('active', popupFilter === 'ACTIVE');
  document.getElementById('filterExpired').classList.toggle('active', popupFilter === 'EXPIRED');
}

function renderPopupList() {
  var q = (document.getElementById('popupSearch').value || '').trim().toUpperCase();
  var el = document.getElementById('popupList');
  var filtered = [];
  for (var i = 0; i < licList.length; i++) {
    var r = licList[i];
    var st = getLicenseStatus(r);
    if (popupFilter === 'PRO' && r.type !== 'PRO') continue;
    if (popupFilter === 'FAMILY' && r.type !== 'FAMILY') continue;
    if (popupFilter === 'ACTIVE' && st.cls !== 'active') continue;
    if (popupFilter === 'EXPIRED' && st.cls !== 'expired' && st.cls !== 'expiring') continue;
    if (q && r.deviceId.toUpperCase().indexOf(q) === -1 && r.key.toUpperCase().indexOf(q) === -1 && (!r.note || r.note.toUpperCase().indexOf(q) === -1)) continue;
    filtered.push(r);
  }
  if (!filtered.length) {
    el.innerHTML = '<div class="popup-empty">موردی یافت نشد</div>';
    return;
  }
  var h = '<div style="font-size:.55rem;color:rgba(61,50,32,.35);margin-bottom:8px">' + filtered.length + ' مورد</div>';
  for (var i = 0; i < filtered.length; i++) {
    var r = filtered[i];
    var st = getLicenseStatus(r);
    h += '<div class="popup-item">';
    h += '<div class="popup-item-top"><div class="popup-item-info"><span class="h-type ' + r.type.toLowerCase() + '">' + r.type + '</span><span class="h-device">' + r.deviceId + '</span><span class="h-status ' + st.cls + '">' + st.text + '</span></div>';
    h += '<button class="popup-item-del" onclick="deleteLicense(' + r.id + ')">حذف</button></div>';
    h += '<div class="popup-item-key" onclick="copyText(\'' + r.key + '\')">' + r.key + ' 📋</div>';
    h += '<div class="popup-item-meta"><span>📅 ' + r.date + '</span><span>⏱ ' + r.duration + ' ماه</span><span>⏰ باقی: ' + getDaysLeft(r) + '</span><span>انقضا: ' + getExpiryDate(r) + '</span></div>';
    if (r.note) h += '<div class="popup-item-note">📝 ' + r.note + '</div>';
    h += '</div>';
  }
  el.innerHTML = h;
}

function deleteLicense(id) {
  if (!confirm('حذف شود؟')) return;
  licList = licList.filter(function(l) { return l.id !== id; });
  saveLicenses();
  renderPopupList();
  renderAll();
  showToast('حذف شد', 'green');
}

function exportJSON() {
  if (!licList.length) { showToast('خالی است', 'red'); return; }
  var blob = new Blob([JSON.stringify(licList, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'poolam-licenses-' + new Date().toISOString().substr(0, 10) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('دانلود شد ✓', 'green');
}

function importJSON(evt) {
  var f = evt.target.files[0];
  if (!f) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) { showToast('فرمت نامعتبر', 'red'); return; }
      var c = 0;
      for (var i = 0; i < data.length; i++) {
        var exists = false;
        for (var j = 0; j < licList.length; j++) {
          if (licList[j].key === data[i].key) { exists = true; break; }
        }
        if (!exists) { licList.push(data[i]); c++; }
      }
      saveLicenses();
      showToast(c + ' مورد وارد شد ✓', 'green');
      renderAll();
    } catch (err) { showToast('فایل نامعتبر', 'red'); }
  };
  reader.readAsText(f);
  evt.target.value = '';
}

function exportCSV() {
  if (!licList.length) { showToast('خالی است', 'red'); return; }
  var c = 'تاریخ,شناسه,نوع,کد,مدت,انقضا,باقیمانده,وضعیت,یادداشت\n';
  for (var i = 0; i < licList.length; i++) {
    var r = licList[i];
    var st = getLicenseStatus(r);
    c += r.date + ',' + r.deviceId + ',' + r.type + ',' + r.key + ',' + r.duration + ' ماه,' + getExpiryDate(r) + ',' + getDaysLeft(r) + ',' + st.text + ',' + (r.note || '') + '\n';
  }
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF' + c], { type: 'text/csv;charset=utf-8;' }));
  a.download = 'poolam-licenses.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('دانلود شد ✓', 'green');
}

function clearAll() {
  if (!confirm('همه حذف شود؟')) return;
  licList = [];
  saveLicenses();
  closeHistoryPopup();
  renderAll();
  showToast('پاک شد', 'green');
}

function renderAll() {
  renderStats();
  renderRecent();
}

document.getElementById('historyPopup').addEventListener('click', function(e) {
  if (e.target === this) closeHistoryPopup();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeHistoryPopup();
});

loadLicenses();
renderAll();
</script>
</body>
</html>
